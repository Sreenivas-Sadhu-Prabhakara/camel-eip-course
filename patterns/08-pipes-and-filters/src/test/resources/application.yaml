camel:
  springboot:
    name: shopflow-pipeline-test
    main-run-controller: false

# In tests, the pipeline's output channel goes to a mock endpoint so we can assert on the final body.
ep:
  out: "mock:out"

app:
  demo:
    enabled: false   # keep the timer feeder OFF so tests are deterministic

logging:
  level:
    root: WARN
    com.example.eip: INFO
