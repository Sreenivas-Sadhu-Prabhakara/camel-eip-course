spring:
  main:
    banner-mode: "off"

camel:
  springboot:
    name: shopflow-filter
    # Keep the JVM alive under `spring-boot:run` even though the routes have no blocking consumer.
    main-run-controller: true

# The single destination for orders that survive the Message Filter.
# In a real system this would be a direct:/jms: endpoint to a downstream service;
# here it logs so you can watch which orders are kept when you run the app.
ep:
  out: "log:kept?showBody=true"

app:
  demo:
    enabled: true   # the timer feeder injects sample orders so `spring-boot:run` shows filtering

logging:
  level:
    root: INFO
