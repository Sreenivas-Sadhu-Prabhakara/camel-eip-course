spring:
  main:
    banner-mode: "off"

camel:
  springboot:
    name: shopflow-channel
    # Keep the JVM alive under `spring-boot:run` even though the routes have no blocking consumer.
    main-run-controller: true

# The terminal endpoint of the process route.
# In a real system this would be a direct:/jms: endpoint to a downstream service;
# here it logs so you can watch the message land after the async seda hop.
ep:
  out: "log:out?showBody=true"

app:
  demo:
    enabled: true   # the timer feeder injects sample orders so `spring-boot:run` shows the hand-off

logging:
  level:
    root: INFO
