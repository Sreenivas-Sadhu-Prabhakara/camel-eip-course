spring:
  main:
    banner-mode: "off"

camel:
  springboot:
    name: shopflow-cbr
    # Keep the JVM alive under `spring-boot:run` even though the routes have no blocking consumer.
    main-run-controller: true

# The three branch targets of the Content-Based Router.
# In a real system these would be direct:/jms: endpoints to downstream services;
# here they log so you can watch routing live when you run the app.
ep:
  domestic: "log:domestic?showBody=true"
  eu: "log:eu?showBody=true"
  international: "log:international?showBody=true"

app:
  demo:
    enabled: true   # the timer feeder injects sample orders so `spring-boot:run` shows routing

logging:
  level:
    root: INFO
