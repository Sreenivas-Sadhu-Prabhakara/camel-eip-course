camel:
  springboot:
    name: shopflow-cbr-test
    main-run-controller: false

# In tests, the Content-Based Router's branches go to mock endpoints so we can assert on them.
ep:
  domestic: "mock:domestic"
  eu: "mock:eu"
  international: "mock:international"

app:
  demo:
    enabled: false   # keep the timer feeder OFF so tests are deterministic

logging:
  level:
    root: WARN
    com.example.eip: INFO
