spring:
  main:
    banner-mode: "off"

camel:
  springboot:
    name: shopflow-firstroute
    # Keep the JVM alive under `spring-boot:run` even though the route has no blocking consumer.
    main-run-controller: true

# The single producer target of the route.
# In a real system this would be a direct:/jms: endpoint to a downstream service;
# here it logs so you can watch the message flow when you run the app.
ep:
  out: "log:out?showBody=true"

app:
  demo:
    enabled: true   # the timer feeder injects a sample order so `spring-boot:run` shows the route working

logging:
  level:
    root: INFO
