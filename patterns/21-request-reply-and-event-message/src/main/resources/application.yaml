spring:
  main:
    banner-mode: "off"

camel:
  springboot:
    name: shopflow-messaging
    # Keep the JVM alive under `spring-boot:run` even though the routes have no blocking consumer.
    main-run-controller: true

# The Event Message destination (InOnly, fire-and-forget).
# In a real system this would be a topic (jms:topic:orders) with 0..N independent subscribers;
# here it logs so you can watch events fly by when you run the app.
ep:
  event: "log:event?showBody=true"

app:
  demo:
    enabled: true   # the timer feeder exercises Request-Reply + Event Message so `spring-boot:run` shows both

logging:
  level:
    root: INFO
