camel:
  springboot:
    name: shopflow-dlq-test
    main-run-controller: false

# In tests the terminal channels go to mock endpoints so we can assert on them:
# the good order must land on mock:ok, the exhausted failing order on mock:dead.
ep:
  ok: "mock:ok"
  dead: "mock:dead"

app:
  demo:
    enabled: false   # keep the timer feeder OFF so tests are deterministic

logging:
  level:
    root: WARN
    com.example.eip: INFO
