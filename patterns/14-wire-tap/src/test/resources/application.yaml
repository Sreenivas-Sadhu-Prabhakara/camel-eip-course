camel:
  springboot:
    name: shopflow-wiretap-test
    main-run-controller: false

# In tests, the main flow and the audit tap go to mock endpoints so we can assert on both.
ep:
  main: "mock:main"
  audit: "mock:audit"

app:
  demo:
    enabled: false   # keep the timer feeder OFF so tests are deterministic

logging:
  level:
    root: WARN
    com.example.eip: INFO
