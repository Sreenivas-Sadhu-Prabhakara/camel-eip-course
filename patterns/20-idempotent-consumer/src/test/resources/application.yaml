camel:
  springboot:
    name: shopflow-idempotent-test
    main-run-controller: false

# In tests, the Idempotent Consumer's exactly-once destination goes to a mock endpoint so we can
# assert exactly how many messages survived deduplication.
ep:
  out: "mock:out"

app:
  demo:
    enabled: false   # keep the timer feeder OFF so tests are deterministic

logging:
  level:
    root: WARN
    com.example.eip: INFO
